<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Realm — HQ Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    /* ============================================
       CSS Custom Properties — Kairosoft Warm Theme
       ============================================ */
    :root {
      --bg-body: #c8b888;
      --bg-card: #f8f0d8;
      --bg-panel: #f0e8d0;
      --bg-header: #3a6a4a;
      --bg-ticker: #2d5a3d;
      --border-main: #a08850;
      --border-hover: #d89020;
      --accent: #d89020;
      --text-primary: #2a1a0a;
      --text-secondary: #5c4a2a;
      --text-muted: #8b7d5c;
      --health-green: #4a9a30;
      --health-yellow: #c89020;
      --health-orange: #c06020;
      --health-red: #c03020;
      --shadow-sm: 0 1px 3px rgba(80,60,20,0.2);
      --shadow-md: 0 4px 12px rgba(80,60,20,0.25);
      --shadow-lg: 0 8px 24px rgba(80,60,20,0.3);
      --glow-blue: 0 0 12px rgba(216,144,32,0.3);
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pixel-font {
      font-family: 'Press Start 2P', monospace;
    }

    /* ============================================
       Top HUD Bar
       ============================================ */
    #hud-top {
      background: var(--bg-header);
      border-bottom: 3px solid #2d5a3d;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(40,30,10,0.3);
      flex-shrink: 0;
      height: 52px;
    }

    .hud-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hud-logo {
      font-size: 22px;
      filter: drop-shadow(0 0 4px rgba(255,255,200,0.4));
    }

    .hud-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #ffe880;
      letter-spacing: 0.08em;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }

    .hud-stats {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .hud-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 10px;
    }

    .hud-chip__label {
      color: rgba(255,255,255,0.6);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hud-chip__value {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #ffe880;
    }

    .efs-bar-wrap {
      width: 60px;
      height: 8px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .efs-bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.5s ease;
    }

    .efs-bar-fill.high { background: linear-gradient(90deg, #4a9a30, #7cc860); }
    .efs-bar-fill.mid  { background: linear-gradient(90deg, #c89020, #e8b830); }
    .efs-bar-fill.low  { background: linear-gradient(90deg, #c03020, #e05040); }

    .hud-timestamp {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      white-space: nowrap;
    }

    /* ============================================
       Game Canvas Container
       ============================================ */
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #game-container canvas {
      display: block;
    }

    /* ============================================
       Bottom Event Ticker
       ============================================ */
    #hud-bottom {
      background: var(--bg-ticker);
      border-top: 3px solid #2d5a3d;
      height: 44px;
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 1000;
      flex-shrink: 0;
      padding: 0 16px;
      gap: 12px;
    }

    .ticker-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: #ffe880;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-scroll {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: flex;
      gap: 40px;
      animation: ticker-slide 30s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker-slide {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #e8e0c8;
      white-space: nowrap;
    }

    .ticker-item__icon {
      font-size: 16px;
    }

    .ticker-item__date {
      font-size: 12px;
      color: #b8b098;
    }

    /* ============================================
       Right Detail Panel (overlay)
       ============================================ */
    #detail-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-main);
      z-index: 900;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    #detail-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-main);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header__title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #8b6520;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-close {
      background: none;
      border: 1px solid var(--border-main);
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }

    .panel-close:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .panel-section {
      margin-bottom: 16px;
    }

    .panel-section__label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .panel-health-bar {
      width: 100%;
      height: 10px;
      background: rgba(160,136,80,0.1);
      border: 1px solid rgba(160,136,80,0.2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .panel-health-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .panel-health-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-secondary);
    }

    .panel-member {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .panel-member:hover {
      background: rgba(160,136,80,0.12);
    }

    .panel-member__icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .panel-member__name {
      font-size: 12px;
      color: var(--text-primary);
      flex: 1;
    }

    .panel-member__chief {
      font-size: 10px;
    }

    .panel-member__rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 2px 4px;
      border-radius: 3px;
      background: rgba(160,136,80,0.1);
    }

    .panel-member__class {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .panel-ability {
      background: rgba(160,136,80,0.08);
      border: 1px solid rgba(160,136,80,0.2);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .panel-ability__name {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #8b6520;
      margin-bottom: 4px;
    }

    .panel-ability__desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ============================================
       Agent Sheet Overlay
       ============================================ */
    #agent-sheet {
      position: fixed;
      inset: 0;
      background: rgba(80,60,20,0.5);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #agent-sheet.open {
      display: flex;
    }

    .sheet-card {
      background: var(--bg-card);
      border: 2px solid var(--border-main);
      border-radius: 12px;
      width: 380px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .sheet-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border-main);
      position: relative;
    }

    .sheet-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: 1px solid var(--border-main);
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .sheet-close:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .sheet-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .sheet-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #8b6520;
      margin-bottom: 4px;
    }

    .sheet-class {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .sheet-rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(160,136,80,0.15);
      border: 1px solid rgba(160,136,80,0.25);
    }

    .sheet-body {
      padding: 16px 20px;
    }

    .sheet-section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sheet-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .sheet-stat {
      text-align: center;
      padding: 8px;
      background: rgba(160,136,80,0.06);
      border-radius: 6px;
      border: 1px solid rgba(160,136,80,0.1);
    }

    .sheet-stat__label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sheet-stat__value {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #8b6520;
    }

    .sheet-xp-bar {
      width: 100%;
      height: 12px;
      background: rgba(160,136,80,0.1);
      border: 1px solid rgba(160,136,80,0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .sheet-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, #d89020, #e8b830);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .sheet-xp-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-secondary);
      margin-top: 4px;
      text-align: right;
    }

    /* ============================================
       Tooltip
       ============================================ */
    #agent-tooltip {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: 6px;
      padding: 8px 12px;
      pointer-events: none;
      z-index: 3000;
      display: none;
      box-shadow: var(--shadow-md);
      max-width: 200px;
    }

    .tooltip-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #8b6520;
      margin-bottom: 4px;
    }

    .tooltip-info {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ============================================
       Scrollbar
       ============================================ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #b8a070; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a08850; }

    /* ============================================
       Achievement Popup
       ============================================ */
    #achievement-popup {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #6b21a8, #9333ea);
      border: 2px solid #c084fc;
      border-radius: 10px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 5000;
      box-shadow: 0 4px 20px rgba(107,33,168,0.5), 0 0 30px rgba(147,51,234,0.3);
      transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      min-width: 280px;
      max-width: 480px;
    }

    #achievement-popup.show {
      top: 64px;
    }

    .achievement-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.6));
    }

    .achievement-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .achievement-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #e9d5ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .achievement-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255,215,0,0.4);
    }

    .achievement-desc {
      font-size: 11px;
      color: #e9d5ff;
    }

    /* ============================================
       Mini Dashboard
       ============================================ */
    #mini-dashboard {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(42,26,10,0.92);
      border-top: 1px solid rgba(216,144,32,0.4);
      z-index: 800;
      font-size: 11px;
      color: #e8e0c8;
      backdrop-filter: blur(4px);
      transition: transform 0.3s ease;
    }

    #mini-dashboard.collapsed #mini-dashboard-body {
      display: none;
    }

    #mini-dashboard-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      cursor: pointer;
      user-select: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #ffe880;
      letter-spacing: 0.05em;
    }

    #mini-dashboard-toggle:hover {
      background: rgba(216,144,32,0.1);
    }

    #mini-dashboard-toggle .toggle-arrow {
      transition: transform 0.3s ease;
      font-size: 10px;
    }

    #mini-dashboard.collapsed #mini-dashboard-toggle .toggle-arrow {
      transform: rotate(180deg);
    }

    #mini-dashboard-body {
      display: flex;
      gap: 20px;
      padding: 0 14px 10px;
      max-height: 180px;
      overflow-y: auto;
    }

    #mini-dashboard-body > div {
      flex: 1;
      min-width: 0;
    }

    .mini-section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: #ffe880;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      margin-top: 0;
    }

    .mini-agent-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .mini-agent-rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      width: 18px;
      text-align: center;
    }

    .mini-agent-name {
      flex: 1;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-agent-xp {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #ffe880;
    }

    .mini-health-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 1px 0;
    }

    .mini-health-name {
      font-size: 9px;
      width: 70px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-health-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .mini-health-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <!-- ============================================
       Top HUD
       ============================================ -->
  <div id="hud-top">
    <div class="hud-brand">
      <span class="hud-logo">{{COMPANY_ICON}}</span>
      <div>
        <div class="hud-title">THE REALM</div>
      </div>
    </div>
    <div class="hud-stats" id="hud-stats">
      <!-- Populated by JS -->
    </div>
    <div class="hud-timestamp" id="hud-timestamp"></div>
  </div>

  <!-- ============================================
       Game Canvas
       ============================================ -->
  <div id="game-container">
    <!-- Phaser renders here -->

    <!-- Detail Panel (overlay inside game container) -->
    <div id="detail-panel">
      <div class="panel-header">
        <div class="panel-header__title" id="panel-title"></div>
        <button class="panel-close" onclick="closePanel()">&times;</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>

    <!-- Mini Dashboard (bottom bar, toggleable) -->
    <div id="mini-dashboard" class="collapsed">
      <div id="mini-dashboard-toggle" onclick="document.getElementById('mini-dashboard').classList.toggle('collapsed')">
        <span>TOP AGENTS / DEPT HEALTH</span>
        <span class="toggle-arrow">&#9650;</span>
      </div>
      <div id="mini-dashboard-body">
        <div>
          <div class="mini-section-title">TOP AGENTS</div>
          <div id="mini-top-agents"></div>
        </div>
        <div>
          <div class="mini-section-title">DEPT HEALTH</div>
          <div id="mini-dept-health"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================
       Bottom Ticker
       ============================================ -->
  <div id="hud-bottom">
    <span class="ticker-label">EVENTS</span>
    <div class="ticker-scroll">
      <div class="ticker-track" id="ticker-track">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- ============================================
       Agent Sheet Overlay
       ============================================ -->
  <div id="agent-sheet" onclick="if(event.target===this)closeSheet()">
    <div class="sheet-card" id="sheet-card"></div>
  </div>

  <!-- ============================================
       Tooltip
       ============================================ -->
  <div id="agent-tooltip">
    <div class="tooltip-name" id="tooltip-name"></div>
    <div class="tooltip-info" id="tooltip-info"></div>
  </div>

  <!-- ============================================
       Achievement Popup
       ============================================ -->
  <div id="achievement-popup">
    <span class="achievement-icon" id="achievement-icon"></span>
    <div class="achievement-body">
      <span class="achievement-label">Achievement Unlocked!</span>
      <span class="achievement-name" id="achievement-name"></span>
      <span class="achievement-desc" id="achievement-desc"></span>
    </div>
  </div>

  <!-- ============================================
       Embedded Realm Data
       ============================================ -->
  <script>
    const REALM_DATA = {{REALM_DATA_JSON}};
  </script>

  <!-- ============================================
       Game Logic
       ============================================ -->
  <script>
  (function() {
    'use strict';

    // ==========================================
    // Constants
    // ==========================================
    const WORLD_W = 3200;
    const WORLD_H = 1800;

    const DEPT_COLORS = {
      command: 0xef4444, frontline: 0xf97316, intel: 0x22c55e,
      defense: 0x06b6d4, academy: 0xa855f7, council: 0x6366f1,
      enchant: 0xec4899, workshop: 0x84cc16, observatory: 0x3b82f6,
      herald: 0xf59e0b, pantheon: 0xc026d3, outlands: 0x10b981
    };

    const CLASS_COLORS = {
      commander: 0xef4444, ranger: 0x22c55e, artisan: 0xf97316,
      guardian: 0x06b6d4, paladin: 0xeab308, sage: 0xa855f7,
      alchemist: 0x14b8a6, scribe: 0x8b5cf6, architect: 0x6366f1,
      enchanter: 0xec4899, engineer: 0x84cc16, merchant: 0xf59e0b,
      oracle: 0x06b6d4, herald: 0xf97316, demiurge: 0xc026d3,
      strategist: 0x4f46e5, diplomat: 0x10b981, pioneer: 0xf43f5e,
      navigator: 0x34d399, transmuter: 0xfacc15, watcher: 0x6b7280
    };

    const DEPT_FLOOR_COLORS = {
      command: 0xf5e0c0, frontline: 0xf0ddb8, intel: 0xd8f0d0,
      defense: 0xd0e8f0, academy: 0xe8d8f0, council: 0xd8d8f5,
      enchant: 0xf0d0e0, workshop: 0xe8f0c8, observatory: 0xd0d8f0,

    const RANK_SIZES = {
      F: 26, E: 30, D: 34, C: 38, B: 42, A: 46, S: 50, SS: 54
    };

    const RANK_COLORS = {
      SS: 0xff6eb4, S: 0xbc8cff, A: 0x58a6ff, B: 0x3fb950,
      C: 0xd29922, D: 0x8b949e, E: 0x6e7681, F: 0x484f58
    };

    // Department room positions in world coordinates
    // Layout: 4 columns × 3 rows grid
    const DEPT_LAYOUT = {
      command:      { col: 0, row: 0 },
      council:      { col: 1, row: 0 },
      herald:       { col: 2, row: 0 },
      observatory:  { col: 3, row: 0 },

    const ROOM_W = 640;
    const ROOM_H = 470;
    const GAP_X = 80;
    const GAP_Y = 70;
    const OFFSET_X = 120;
    const OFFSET_Y = 100;

    function deptRect(key) {
      const layout = DEPT_LAYOUT[key];
      if (!layout) return { x: 100, y: 100, w: ROOM_W, h: ROOM_H };
      return {
        x: OFFSET_X + layout.col * (ROOM_W + GAP_X),
        y: OFFSET_Y + layout.row * (ROOM_H + GAP_Y),
        w: ROOM_W,
        h: ROOM_H
      };
    }

    function deptCenter(key) {
      const r = deptRect(key);
      return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
    }

      { from: 'command', to: 'intel', type: 'allied' },
      { from: 'intel', to: 'defense', type: 'allied' },

    // ==========================================
    // Data Manager
    // ==========================================
    const DataManager = {
      data: REALM_DATA,
      lastHash: null,
      listeners: [],
      sessionXP: {},       // agent_name -> session XP delta
      xpListeners: [],     // XP gain event callbacks

      init() {
        this.lastHash = this._computeHash();
        this._startPolling();
      },

      _computeHash() {
        // Simple hash from data for local change detection
        return JSON.stringify(this.data).length.toString();
      },

      _startPolling() {
        // Poll /api/hash every 3s
        setInterval(() => this._checkHash(), 3000);
        // Poll /api/activity every 5s
        setInterval(() => this._fetchActivity(), 5000);
      },

      async _checkHash() {
        try {
          const res = await fetch('/api/hash');
          if (!res.ok) return;
          const json = await res.json();
          if (this.lastHash !== null && json.hash !== this.lastHash) {
            await this._fetchFullData();
          }
          this.lastHash = json.hash;
        } catch (e) {
          // Server not available; continue with embedded data
        }
      },

      async _fetchFullData() {
        try {
          const res = await fetch('/api/data');
          if (!res.ok) return;
          const newData = await res.json();
          this.data = newData;
          this.listeners.forEach(fn => fn(newData));
        } catch (e) {
          // Ignore
        }
      },

      async _fetchActivity() {
        try {
          const res = await fetch('/api/activity');
          if (!res.ok) return;
          const activity = await res.json();
          if (activity.items && activity.items.length > 0) {
            updateTicker(activity.items);
          }
          // Process XP gains from live activity
          if (activity.xp_gains && activity.xp_gains.length > 0) {
            for (const gain of activity.xp_gains) {
              this.xpListeners.forEach(fn => fn(gain));
            }
          }
          // Sync session XP state
          if (activity.session_xp) {
            this.sessionXP = activity.session_xp;
          }
        } catch (e) {
          // Ignore
        }
      },

      onChange(fn) {
        this.listeners.push(fn);
      },

      onXPGain(fn) {
        this.xpListeners.push(fn);
      },

      getEffectiveXP(agentName, baseXP) {
        return baseXP + (this.sessionXP[agentName] || 0);
      }
    };

          <span class="hud-chip__value">${c.efs || 0}</span>
          <div class="efs-bar-wrap">
            <div class="efs-bar-fill ${efsLevel}" style="width:${c.efs || 0}%"></div>

          <span class="hud-chip__value" style="font-size:7px">${c.efsGrade || '?'}</span>
        </div>
        <div class="hud-chip">
          <span class="hud-chip__label">Phase</span>
          <span class="hud-chip__value">${c.phase || '???'}</span>
        </div>
        <div class="hud-chip">
          <span class="hud-chip__label">Agents</span>
          <span class="hud-chip__value">${c.totalAgents || 0}</span>

    function updateTicker(items) {
      const track = document.getElementById('ticker-track');
      if (!items || items.length === 0) return;

      const html = items.map(it =>
        `<span class="ticker-item">
          <span class="ticker-item__icon">${it.icon || '\uD83D\uDCCC'}</span>
          <span>${escapeHtml(it.text || '')}</span>
          <span class="ticker-item__date">${it.date || it.time || ''}</span>
        </span>`
      ).join('');
      // Duplicate for seamless scroll
      track.innerHTML = html + html;
    }

    function initTicker(data) {
      const events = data.events || [];
      if (events.length > 0) {
        updateTicker(events);
      } else {
        updateTicker([{ icon: '\uD83C\uDFF0', text: 'The Realm simulation active', date: '' }]);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;

    }

    // ==========================================
    // Agent Sheet
    // ==========================================
    function openSheet(agentName, deptKey) {
      const dept = DataManager.data.departments[deptKey];
      if (!dept) return;
      const agent = (dept.members || []).find(m => m.name === agentName);
      if (!agent) return;

      const card = document.getElementById('sheet-card');
      const stats = agent.stats || {};
      const sessionDelta = DataManager.sessionXP[agent.name] || 0;
      const effectiveXP = agent.xp + sessionDelta;
      const maxXP = 1000;
      const xpPct = Math.min(100, (effectiveXP / maxXP) * 100);
      const sessionText = sessionDelta > 0
        ? `<span style="color:#3fb950;font-size:10px"> (+${sessionDelta} this session)</span>` : '';

      card.innerHTML = `
        <div class="sheet-header">
          <button class="sheet-close" onclick="closeSheet()">&times;</button>
          <div class="sheet-icon">${agent.classIcon || '\uD83D\uDC64'}</div>
          <div class="sheet-name">${escapeHtml(agent.name)}${agent.isChief ? ' \uD83D\uDC51' : ''}</div>
          <div class="sheet-class">${escapeHtml(agent.class || '')} &mdash; ${escapeHtml(dept.name || '')}</div>
          <div class="sheet-rank" style="color:${rankCssColor(agent.rank)}">Rank ${agent.rank}</div>
        </div>
        <div class="sheet-body">
          <div class="sheet-section-title">Stats</div>
          <div class="sheet-stat-grid">
            ${['str','dex','int','wis','cha','con'].map(k => `
              <div class="sheet-stat">
                <div class="sheet-stat__label">${k}</div>
                <div class="sheet-stat__value">${stats[k] || '?'}</div>
              </div>
            `).join('')}
          </div>
          <div class="sheet-section-title">Experience</div>
          <div class="sheet-xp-bar">
            <div class="sheet-xp-fill" style="width:${xpPct}%"></div>
          </div>
          <div class="sheet-xp-text">${effectiveXP} / ${maxXP} XP${sessionText}</div>
        </div>
      `;

      document.getElementById('agent-sheet').classList.add('open');
    }
    // Expose globally for onclick handlers
    window.openSheet = openSheet;

    function closeSheet() {
      document.getElementById('agent-sheet').classList.remove('open');
    }
    window.closeSheet = closeSheet;
    window.closePanel = closePanel;

    function rankCssColor(rank) {
      const map = {
        SS: '#ff6eb4', S: '#bc8cff', A: '#58a6ff', B: '#3fb950',
        C: '#d29922', D: '#8b949e', E: '#6e7681', F: '#484f58'
      };
      return map[rank] || '#8b949e';
    }

      document.getElementById('tooltip-name').textContent = name;

      const effectiveXP = xp + sessionDelta;
      const deltaText = sessionDelta > 0 ? ` <span style="color:#3fb950">(+${sessionDelta})</span>` : '';
