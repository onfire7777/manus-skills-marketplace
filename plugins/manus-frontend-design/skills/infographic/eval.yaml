version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-infographic
    should_trigger: true
    prompt: "Use the infographic skill to create a dense one-page infographic."
  - id: implicit-infographic
    should_trigger: true
    prompt: "Make a visual summary infographic from this structured content in a single image."
  - id: negative-control-comic
    should_trigger: false
    prompt: "Turn this story into a multi-page educational comic."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/scaffold.ts"
      - file_exists: "scripts/build-prompt.ts"
      - file_exists: "scripts/build-batch.ts"
